[supervisord]
nodaemon=true
user=root
logfile=/var/www/storage/logs/supervisor.log
pidfile=/var/run/supervisord.pid

[program:laravel-worker]
command=php /var/www/artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
directory=/var/www
user=root
autostart=true
autorestart=true
stopwaitsecs=3600
stdout_logfile=/var/www/storage/logs/supervisor.log
stderr_logfile=/var/www/storage/logs/supervisor.log
